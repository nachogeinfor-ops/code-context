name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Pytest
        run: pytest -v

  hf-guard:
    name: HF model registry guard
    runs-on: ubuntu-latest
    needs: test  # Don't waste CI on this if the main suite is already failing.
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install (deps + project)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: HF model registry guard
        run: pytest -q -m network tests/contract/test_hf_models.py
