name: Release

# Tag-driven publish to PyPI via Trusted Publisher (OIDC, no secrets).
# One-time setup steps in docs/release.md.

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install build backend
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Quick `twine check` sanity
        run: |
          python -m pip install --upgrade twine
          twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/p/code-context-mcp
    permissions:
      id-token: write   # OIDC for PyPI Trusted Publisher
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via PyPI Trusted Publisher
        uses: pypa/gh-action-pypi-publish@release/v1
